<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Offline · VT Portal</title>
<meta name="theme-color" content="#241b52">
<link rel="icon" type="image/png" href="assets/icons/icon-192.png">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(165deg, #241b52 0%, #4a3a9e 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.22);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 16px;
    padding: 32px 26px;
    box-shadow: 0 18px 40px -18px rgba(0,0,0,0.6);
  }
  .logo { width: 72px; height: 72px; border-radius: 16px; margin: 0 auto 18px; display: block; }
  h1 { font-size: 21px; margin: 0 0 8px; font-weight: 700; }
  p { font-size: 15px; line-height: 1.5; color: rgba(255,255,255,0.78); margin: 0 0 22px; }
  button {
    font: inherit; font-weight: 600; cursor: pointer;
    color: #241b52; background: #dfa949;
    border: 0; border-radius: 9px; padding: 11px 20px;
  }
  button:active { transform: translateY(1px); }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="assets/icons/icon-192.png" alt="VT Portal">
    <h1>You're offline</h1>
    <p>The VT Portal needs a connection to load this page. Check your network and try again.</p>
    <button type="button" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
